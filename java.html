            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 12px 20px;
        }

        th {
            background-color: #f5f5f5;
            color: #333;
            font-weight: 600;
            border-bottom: 2px solid #e0e0e0;
            position: sticky;
            top: 53px; /* Navbar'ın hemen altında kalması için */

        }

        tr {
            border-bottom: 1px solid #edf2f7;
            transition: background-color 0.1s;
        }

        tr:hover {
            background-color: #f8fafc;
        }

        td:first-child {
            color: #1a202c;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: 0.95rem;
            width: 60%;
